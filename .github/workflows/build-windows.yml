name: Build BitePOS Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: |
          npx prisma generate
          node scripts/patch-prisma.mjs
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Build Next.js
        run: npx next build
        env:
          DATABASE_URL: "file:./dev.db"
          JWT_SECRET: bitepos-prod-build-placeholder

      - name: Reset & seed production database
        shell: bash
        run: |
          rm -f dev.db dev.db-journal dev.db-wal
          npx prisma db push --accept-data-loss
          npx tsx prisma/seed-prod.ts
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Verify database
        shell: bash
        run: |
          npx tsx -e "const db=require('better-sqlite3')('./dev.db'); const r=db.prepare('SELECT count(*) as c FROM Staff').get(); console.log('Staff count:', r.c); db.close()"

      - name: Build Electron app
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: BitePOS-Installer
          path: dist-electron/*.exe
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}